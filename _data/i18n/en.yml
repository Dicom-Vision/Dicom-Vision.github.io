  # Feature sections
  zero_footprint:
    title: "ZERO-FOOTPRINT VIEWER"
    text: >-
      This means that <strong>no additional software or plugins</strong> need
      to be installed on the user's device. The viewer can be accessed
      through a <strong>web browser</strong>, making access to medical images
      extremely convenient and flexible.

  dicom_storage:
    title: "DICOM STORAGE AND DISPLAY"
    text: >-
      DICOM Vision is designed to handle medical images
      in the <strong>DICOM format</strong>, which is a widely used standard in the
      field of medical imaging. It can store and display a wide range
      of <strong>diagnostic images</strong>, including <strong>X-rays</strong>,
      <strong>CT scans</strong>, <strong>MRIs</strong>, <strong>ultrasounds</strong>,
      and more.

  views:
    title: "2D AND 3D VIEWS"
    text: >-
      The viewer supports not only <strong>2D image views</strong> but also
      <strong>advanced 3D views</strong>. This is particularly useful for creating
      <strong>three-dimensional models</strong> from imaging data, allowing for a
      better understanding of anatomical structures.

  remote_collaboration:
    title: "REMOTE COLLABORATION"
    text: >-
      One of the key features of DICOM Vision is its ability to support
      <strong>remote collaboration</strong>. Healthcare professionals can easily
      <strong>share images</strong> with colleagues or specialists around the world,
      enabling quicker and more convenient consultation and <strong>second opinions</strong>.

  artificial_intelligence:
    title: "ARTIFICIAL INTELLIGENCE"
    text: >-
      The viewer can integrate <strong>artificial intelligence (AI)</strong>
      features for <strong>automatic image analysis</strong>. This may include
      <strong>anomaly detection</strong>, <strong>anatomical structure segmentation</strong>,
      and other advanced AI applications for image interpretation.

  measurement_tools:
    title: "MEASUREMENT TOOLS"
    text: >-
      DICOM Vision offers a range of <strong>measurement tools</strong> that
      allow users to make <strong>precise measurements</strong> directly on images.
      This is essential for <strong>diagnostic</strong> and <strong>patient monitoring</strong> purposes.

  pacs:
    title: "PACS INTEGRATION"
    text: >-
      DICOM Vision supports <strong>PACS storage and communication</strong>,
      making it a seamless solution for healthcare facilities that rely on PACS systems
      to manage and distribute medical images efficiently. This ensures easy
      <strong>integration</strong> with existing infrastructure and simplifies the
      <strong>sharing and retrieval</strong> of patient data within healthcare networks.

  # Application fields
  app_fields_title: "Application Fields"
  app_fields_intro: >-
    DICOM Vision's <strong>zero-footprint viewer</strong>,
    <strong>AI capabilities</strong>, <strong>3D visualization</strong>, and
    <strong>secure access</strong> to medical images enhance the quality of
    <strong>patient care</strong>, research, teaching, and
    <strong>diagnostic accuracy</strong>. Its flexibility and adaptability
    make it a valuable asset for professionals in various healthcare-related
    fields.

  radiology:
    title: "Radiology"
    text: >-
      DICOM Vision is well-suited for <strong>radiology practices</strong>,
      allowing radiologists to view and analyze medical images such as
      <strong>X-rays, CT scans, and MRIs</strong> with ease. Its advanced
      features, like <strong>3D visualization</strong> and
      <strong>AI integration</strong>, enhance diagnostic capabilities.

  surgical:
    title: "Surgical Planning"
    text: >-
      Surgeons can use DICOM Vision to <strong>plan surgeries</strong>
      more effectively by visualizing
      <strong>patient-specific anatomical structures</strong> and
      pathology in <strong>2D and 3D</strong>. This aids in
      <strong>preoperative assessment</strong> and strategizing.

  research:
    title: "Research"
    text: >-
      Medical researchers can utilize DICOM Vision to access and analyze
      large sets of <strong>medical imaging data</strong>. The
      <strong>AI capabilities</strong> assist in automating certain
      tasks, while <strong>3D visualization</strong> can help in
      understanding complex anatomical relationships.

  education:
    title: "Education"
    text: >-
      In <strong>medical education</strong>, DICOM Vision is a valuable
      tool for teaching anatomy and <strong>diagnostic skills</strong>.
      It allows educators to demonstrate <strong>real clinical cases</strong>
      to students, fostering a better understanding of medical imaging.

  telemedicine:
    title: "Telemedicine"
    text: >-
      DICOM Vision's <strong>remote collaboration</strong> features are
      particularly beneficial in telemedicine. Healthcare providers can
      <strong>share and discuss medical images</strong> with colleagues
      and specialists across distances, making
      <strong>telemedicine consultations</strong> more effective.

  veterinary:
