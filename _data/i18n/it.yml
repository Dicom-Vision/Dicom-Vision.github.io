home:
  title: "DICOM Vision | Visualizzatore DICOM zero-footprint e piattaforma IA per imaging"
  description: "DICOM Vision è un visualizzatore DICOM zero-footprint sicuro e una piattaforma cloud con IA per imaging medicale, visualizzazione 3D e collaborazione clinica remota."
