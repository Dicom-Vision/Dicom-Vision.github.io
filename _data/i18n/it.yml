  about_title: "Trasformiamo i Flussi di Lavoro dell'Imaging Clinico"
  about_text: >-
    Dalla <strong>visualizzazione zero-footprint</strong> all'<strong>analisi
    basata sull'IA</strong> e alla <strong>visualizzazione 3D avanzata</strong>,
    DICOM Vision ottimizza i <strong>flussi diagnostici</strong> nei reparti
    di radiologia e clinici. Progettato per la <strong>scalabilità</strong> e
    l'<strong>integrazione sicura</strong> nelle infrastrutture ospedaliere,
    consente <strong>decisioni cliniche più rapide</strong>,
    una <strong>collaborazione migliorata</strong> e una
    <strong>gestione efficiente</strong> dei dati di imaging medicale.
  cert_iso: "ISO 13485"
  cert_text: "Sistema di Gestione della Qualità per Dispositivi Medici (Certificato IMQ)"
  cert_link: "Visualizza certificato (PDF)"

  general_title: "La Piattaforma Cloud Intelligente per l'Imaging Medicale"
  general_text: >-
    DICOM Vision è uno strumento completo e all'avanguardia per la gestione
    delle immagini medicali che combina la facilità d'uso di un visualizzatore
    zero-footprint con funzionalità avanzate come la visualizzazione 3D,
    l'intelligenza artificiale e la collaborazione remota. È uno strumento
    prezioso per i professionisti sanitari che si affidano alle immagini
    diagnostiche per fornire cure di alta qualità ai pazienti.

  # Sezioni funzionalita'
  zero_footprint:
    title: "VISUALIZZATORE ZERO-FOOTPRINT"
    text: >-
      Questo significa che <strong>non è necessario installare software
      o plugin aggiuntivi</strong> sul dispositivo dell'utente. Il visualizzatore
      è accessibile tramite un <strong>browser web</strong>, rendendo l'accesso
      alle immagini medicali estremamente comodo e flessibile.

  dicom_storage:
    title: "ARCHIVIAZIONE E VISUALIZZAZIONE DICOM"
    text: >-
      DICOM Vision è progettato per gestire immagini medicali nel
      <strong>formato DICOM</strong>, uno standard ampiamente utilizzato
      nel campo dell'imaging medicale. Può archiviare e visualizzare
      un'ampia gamma di <strong>immagini diagnostiche</strong>, tra cui
      <strong>radiografie</strong>, <strong>TAC</strong>,
      <strong>risonanze magnetiche</strong>, <strong>ecografie</strong>
      e molto altro.

  views:
    title: "VISTE 2D E 3D"
    text: >-
      Il visualizzatore supporta non solo <strong>viste 2D</strong> ma anche
      <strong>viste 3D avanzate</strong>. Questo è particolarmente utile per
      creare <strong>modelli tridimensionali</strong> dai dati di imaging,
      permettendo una migliore comprensione delle strutture anatomiche.

  remote_collaboration:
    title: "COLLABORAZIONE REMOTA"
    text: >-
      Una delle funzionalità chiave di DICOM Vision è la capacità di
      supportare la <strong>collaborazione remota</strong>. I professionisti
      sanitari possono facilmente <strong>condividere le immagini</strong>
      con colleghi o specialisti in tutto il mondo, consentendo consulti
      più rapidi e <strong>secondi pareri</strong> più convenienti.

  artificial_intelligence:
    title: "INTELLIGENZA ARTIFICIALE"
    text: >-
      Il visualizzatore può integrare funzionalità di
      <strong>intelligenza artificiale (IA)</strong> per l'<strong>analisi
      automatica delle immagini</strong>. Questo include il
      <strong>rilevamento di anomalie</strong>, la <strong>segmentazione
      delle strutture anatomiche</strong> e altre applicazioni avanzate
      di IA per l'interpretazione delle immagini.

  measurement_tools:
    title: "STRUMENTI DI MISURAZIONE"
    text: >-
      DICOM Vision offre una gamma di <strong>strumenti di misurazione</strong>
      che consentono agli utenti di effettuare <strong>misurazioni precise</strong>
      direttamente sulle immagini. Questo è essenziale per scopi
      <strong>diagnostici</strong> e di <strong>monitoraggio del paziente</strong>.

  pacs:
    title: "INTEGRAZIONE PACS"
    text: >-
      DICOM Vision supporta l'<strong>archiviazione e la comunicazione PACS</strong>,
      rendendolo una soluzione integrata per le strutture sanitarie che si affidano
      ai sistemi PACS per gestire e distribuire le immagini medicali in modo
      efficiente. Questo garantisce una facile <strong>integrazione</strong>
      con l'infrastruttura esistente e semplifica la <strong>condivisione e il
      recupero</strong> dei dati dei pazienti all'interno delle reti sanitarie.

  # Campi di applicazione
  app_fields_title: "Campi di Applicazione"
  app_fields_intro: >-
    Il <strong>visualizzatore zero-footprint</strong> di DICOM Vision,
    le <strong>funzionalità IA</strong>, la <strong>visualizzazione 3D</strong>
    e l'<strong>accesso sicuro</strong> alle immagini medicali migliorano
    la qualità della <strong>cura del paziente</strong>, della ricerca,
    dell'insegnamento e dell'<strong>accuratezza diagnostica</strong>.
    La sua flessibilità e adattabilità lo rendono uno strumento prezioso
    per i professionisti in vari settori legati alla sanità.

  radiology:
    title: "Radiologia"
    text: >-
      DICOM Vision è ideale per gli <strong>studi radiologici</strong>,
      consentendo ai radiologi di visualizzare e analizzare immagini medicali
      come <strong>radiografie, TAC e risonanze magnetiche</strong> con facilità.
      Le sue funzionalità avanzate, come la <strong>visualizzazione 3D</strong>
      e l'<strong>integrazione IA</strong>, potenziano le capacità diagnostiche.

  surgical:
    title: "Pianificazione Chirurgica"
    text: >-
      I chirurghi possono utilizzare DICOM Vision per <strong>pianificare
      gli interventi</strong> in modo più efficace, visualizzando le
      <strong>strutture anatomiche specifiche del paziente</strong> e la
      patologia in <strong>2D e 3D</strong>. Questo aiuta nella
      <strong>valutazione preoperatoria</strong> e nella strategia.

  research:
    title: "Ricerca"
    text: >-
      I ricercatori possono utilizzare DICOM Vision per accedere e analizzare
      grandi set di <strong>dati di imaging medicale</strong>. Le
      <strong>funzionalità IA</strong> assistono nell'automazione di determinate
      attività, mentre la <strong>visualizzazione 3D</strong> può aiutare
      nella comprensione di relazioni anatomiche complesse.

  education:
    title: "Formazione"
    text: >-
      Nella <strong>formazione medica</strong>, DICOM Vision è uno strumento
      prezioso per insegnare anatomia e <strong>competenze diagnostiche</strong>.
      Permette ai docenti di mostrare <strong>casi clinici reali</strong>
      agli studenti, favorendo una migliore comprensione dell'imaging medicale.

  telemedicine:
    title: "Telemedicina"
    text: >-
      Le funzionalità di <strong>collaborazione remota</strong> di DICOM Vision
      sono particolarmente utili nella telemedicina. I professionisti sanitari
      possono <strong>condividere e discutere immagini medicali</strong> con
      colleghi e specialisti a distanza, rendendo i
      <strong>consulti di telemedicina</strong> più efficaci.

  veterinary:
    title: "Veterinaria"
    text: >-
      L'applicazione di DICOM Vision si estende alla
      <strong>medicina veterinaria</strong>. I veterinari possono utilizzare
      il visualizzatore per la <strong>diagnosi e la pianificazione del
      trattamento</strong> degli animali, in particolare per condizioni che
      richiedono <strong>imaging</strong>, come
      <strong>fratture e malattie interne</strong>.

