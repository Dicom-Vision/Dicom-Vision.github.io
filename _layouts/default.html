<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% seo %}
    <link
      rel="shortcut icon"
      href="{{relative_url}}/assets/images/favicon.ico"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{relative_url}}/assets/css/plugins.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{relative_url}}/assets/type/type.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/main.css' | relative_url }}"
    />
    <!--page wise css-->
    {% if page.custom_css -%} {%- for stylesheet in page.custom_css -%}
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ site.baseurl }}/assets/css/color/{{ stylesheet }}.css"
    />
    {% endfor %} {%- endif -%} {%- if page.custom_font -%} {% for stylesheet in
    page.custom_font %}
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ site.baseurl }}/assets/css/font/{{ stylesheet }}.css"
    />
    {% endfor %} {% endif %}
    <!--/.page wise css-->
    {% if site.google_analytics %}
      {% include analytics.html %}
    {% endif %}
  </head>
  <body {% if page.overflow %} class="overflow-hidden" {% endif %}>
    <div class="content-wrapper">{{ content }}</div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{relative_url}}/assets/js/plugins.js"></script>
    <script src="{{relative_url}}/assets/js/simple-jekyll-search.min.js"></script>
    <script src="{{relative_url}}/assets/js/scripts.js"></script>
  </body>
</html>
