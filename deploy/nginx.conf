# Nginx config for dual-domain DICOM Vision
# Place in /etc/nginx/sites-available/dicomvision

# English site — dicom.vision
server {
    listen 80;
    server_name dicom.vision www.dicom.vision;
    return 301 https://dicom.vision$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dicom.vision www.dicom.vision;

    root /var/www/dicomvision/en;
    index index.html;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/dicom.vision/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dicom.vision/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA-style fallback
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    error_page 404 /404.html;
}

